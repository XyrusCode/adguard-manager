<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdGuard Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <span class="app-name">AdGuard Manager</span>
    <div class="tabs">
      <button class="tab active" data-tab="dashboard">Dashboard</button>
      <button class="tab" data-tab="dns">DNS Settings</button>
      <button class="tab" data-tab="usage">Usage</button>
      <button class="tab" data-tab="connections">Connections</button>
    </div>
  </nav>

  <main>
    <!-- Dashboard -->
    <section id="dashboard" class="page active">
      <div id="status-card" class="card status-card"></div>
      <h2>Live Traffic</h2>
      <div id="live-traffic" class="traffic-grid"></div>
    </section>

    <!-- DNS Settings -->
    <section id="dns" class="page">
      <div class="page-header">
        <h1>DNS Settings</h1>
        <button id="btn-refresh-adapters" class="btn">Refresh</button>
      </div>
      <p class="warn-banner">Changing DNS requires administrator / root privileges.</p>
      <div id="adapter-list"></div>
      <p id="dns-msg" class="msg"></p>
    </section>

    <!-- Usage -->
    <section id="usage" class="page">
      <div class="page-header">
        <h1>Network Usage</h1>
        <div class="filter-row">
          <label>Period
            <select id="sel-period">
              <option value="1">Last Hour</option>
              <option value="24">Last 24 h</option>
              <option value="168">Last 7 days</option>
              <option value="87600">All time</option>
            </select>
          </label>
          <label>Interface
            <input id="inp-iface" type="text" placeholder="all">
          </label>
          <button id="btn-refresh-usage" class="btn">Refresh</button>
        </div>
      </div>
      <canvas id="usage-canvas" height="220"></canvas>
      <div class="table-wrap">
        <table id="usage-table">
          <thead><tr><th>Interface</th><th>Received</th><th>Sent</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- Connections -->
    <section id="connections" class="page">
      <div class="page-header">
        <h1>Active Connections</h1>
        <label class="filter-row">
          Filter <input id="inp-conn-filter" type="text" placeholder="process or address">
        </label>
      </div>
      <p id="conn-count" class="sub"></p>
      <div class="table-wrap">
        <table id="conn-table">
          <thead>
            <tr>
              <th>PID</th><th>Process</th><th>Proto</th>
              <th>Local</th><th>Remote</th><th>State</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
