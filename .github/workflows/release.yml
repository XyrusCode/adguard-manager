name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build (e.g. v0.1.0)
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build — ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            tauri_args: '--target x86_64-pc-windows-msvc'

          - name: Linux x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            tauri_args: '--target x86_64-unknown-linux-gnu'

          - name: macOS x86_64
            os: macos-13
            target: x86_64-apple-darwin
            tauri_args: '--target x86_64-apple-darwin'

          - name: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
            tauri_args: '--target aarch64-apple-darwin'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Generate app icons
        run: |
          node scripts/gen-icons.mjs
          npx tauri icon src-tauri/icons/source.png

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.tauri_args }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - name: List installers
        run: find installers -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: AdGuard Manager ${{ github.ref_name }}
          body: |
            ## AdGuard Manager ${{ github.ref_name }}

            DNS-based ad blocking and network usage tracker powered by AdGuard DNS.

            ### Installers

            | Platform | File |
            |---|---|
            | Windows | `.msi` (recommended) or `.exe` (NSIS) |
            | Linux | `.deb` (Debian/Ubuntu) or `.AppImage` (universal) |
            | macOS | `.dmg` |

            ### First run

            **Windows:** Right-click → *Run as administrator* (required for DNS changes).
            **Linux:** Your user must be in the `netdev` group, or run with `sudo`.
            **macOS:** You will be prompted for your password on the first DNS change.
          files: installers/**
          fail_on_unmatched_files: false
          generate_release_notes: true
