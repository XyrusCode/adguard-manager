name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x86_64
            os: windows-latest
          - platform: linux-x86_64
            os: ubuntu-22.04
          - platform: macos-x86_64
            os: macos-13
          - platform: macos-aarch64
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: AdGuard Manager ${{ github.ref_name }}
          releaseBody: |
            DNS-based ad blocking and network usage tracker powered by AdGuard DNS.

            **Supported platforms:** Windows, Linux, macOS (x86 + Apple Silicon)

            **First run on Windows:** right-click the exe → Run as administrator to allow DNS changes.
          releaseDraft: false
          prerelease: false
